<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Serebii Pokedex Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Press Start 2P', monospace; 
      padding: 1.5rem; 
      background: linear-gradient(135deg, #c0c0c8 0%, #a8a8b0 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      color: #0f380f;
    }
    h1 { 
      color: #0f380f; 
      text-align: center; 
      font-size: 24px;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
      margin-bottom: 1rem;
      display: none;
    }
    h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 18px;
      color: #8bac0f;
      text-shadow: 1px 1px 0px rgba(0,0,0,0.15);
      margin-bottom: 1rem;
    }
    .screen-container { 
      background: linear-gradient(135deg, #a0a0b0 0%, #b0b0c0 100%);
      border-radius: 28px; 
      padding: 12px; 
      box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
      max-width: 420px; 
      margin: 0 auto;
      border: 2px solid #909090;
    }
    .screen { 
      background: linear-gradient(180deg, #0f380f 0%, #1a4d1a 100%);
      border-radius: 14px; 
      padding: 20px; 
      border: 3px solid #6b8c6b;
      color: #8bac0f;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }
    .screen::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      border-radius: 14px;
    }
    #output { 
      white-space: normal; 
      margin-top: 16px;
      font-size: 10px;
      line-height: 1.6;
    }
    #output img {
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      max-width: 120px;
      margin: 12px auto;
      display: block;
    }
    label {
      display: inline-block;
      font-size: 10px;
      margin-right: 8px;
      color: #8bac0f;
    }
    #gen-select {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 6px 8px;
      margin-bottom: 12px;
      background: #1a4d1a;
      color: #8bac0f;
      border: 2px solid #6b8c6b;
      border-radius: 4px;
      cursor: pointer;
    }
    #gen-select option {
      background: #1a4d1a;
      color: #8bac0f;
    }
    input { 
      padding: 10px; 
      margin-bottom: 12px; 
      width: 100%; 
      border: 2px solid #6b8c6b; 
      background: #1a4d1a; 
      color: #8bac0f; 
      border-radius: 4px; 
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
    }
    input::placeholder {
      color: #6b8c6b;
    }
    input:focus {
      outline: none;
      border-color: #8bac0f;
      box-shadow: 0 0 8px rgba(139, 172, 15, 0.3);
    }
    button { 
      background-color: #8bac0f; 
      padding: 10px 16px; 
      border: 2px solid #6b8c6b;
      border-radius: 4px; 
      font-family: 'Press Start 2P', monospace;
      font-size: 10px; 
      color: #0f380f;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
      transition: all 0.05s;
    }
    button:hover {
      background-color: #9fbb1f;
    }
    button:active { 
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }
    a { 
      color: #8bac0f; 
      text-decoration: none;
      font-size: 10px;
      display: inline-block;
      margin: 8px 0;
      border: 1px solid #6b8c6b;
      padding: 4px 8px;
      border-radius: 4px;
    }
    a:hover {
      background: #6b8c6b;
      color: #0f380f;
    }
    ul { 
      padding-left: 20px; 
      font-size: 10px;
      line-height: 1.6;
    }
    li {
      margin-bottom: 4px;
    }
    .tabs { 
      margin-top: 16px; 
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .tab-btn { 
      background: #6b8c6b; 
      border: 2px solid #8bac0f; 
      color: #0f380f; 
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; 
      padding: 6px 10px; 
      cursor: pointer;
      border-radius: 4px;
      box-shadow: 0 2px 0 rgba(0,0,0,0.2);
      transition: all 0.05s;
    }
    .tab-btn:hover {
      background: #7d9d7d;
    }
    .tab-btn:active {
      transform: translateY(2px);
      box-shadow: 0 0 0 rgba(0,0,0,0.2);
    }
    .tab-btn.active { 
      background: #8bac0f;
      color: #0f380f;
      box-shadow: inset 0 2px 0 rgba(0,0,0,0.2);
    }
    .tab-content { 
      margin-top: 12px;
      font-size: 10px;
      line-height: 1.6;
    }
    .evolution-chains {
      margin: 12px 0;
    }
    .evolution-chains table { 
      border: 2px solid #6b8c6b; 
      margin-bottom: 12px;
      width: 100%;
      border-collapse: collapse;
      background: #1a4d1a;
    }
    .evolution-chains th {
      background: #6b8c6b;
      color: #0f380f;
      padding: 6px;
      text-align: center;
      font-size: 9px;
      border: 1px solid #8bac0f;
    }
    .evolution-chains td { 
      border: 1px solid #6b8c6b; 
      text-align: center;
      padding: 8px;
      font-size: 10px;
    }
    .evolution-chains img {
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      max-width: 80px;
      border: 1px solid #6b8c6b;
      background: #1a4d1a;
      padding: 2px;
    }
    /* autocomplete suggestions */
    .suggestions { 
      position: relative;
      z-index: 10;
    }
    .suggestions ul { 
      list-style: none; 
      margin: 4px 0 0 0; 
      padding: 0; 
      background: #1a4d1a;
      border: 2px solid #6b8c6b;
      border-radius: 4px;
      max-height: 150px; 
      overflow-y: auto;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .suggestions li { 
      padding: 6px 8px; 
      font-size: 10px; 
      cursor: pointer;
      border-bottom: 1px solid #0f380f;
    }
    .suggestions li:last-child {
      border-bottom: none;
    }
    .suggestions li:hover {
      background: #6b8c6b;
      color: #0f380f;
    }
    .suggestions li.active { 
      background: #8bac0f; 
      color: #0f380f;
      font-weight: bold;
    }
    table {
      font-size: 10px;
      border-collapse: collapse;
      margin: 8px 0;
    }
    td, th {
      padding: 4px 6px;
      border: 1px solid #6b8c6b;
      text-align: left;
    }
    th {
      background: #6b8c6b;
      color: #0f380f;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Pokedex Lookup</h1>
  <div class="screen-container">
    <div class="screen">
      <div style="margin-bottom:8px;">
        <label for="gen-select" style="font-size:10px;">Gen:</label>
        <select id="gen-select" style="font-family:monospace; font-size:10px;">
          <option value="all">All</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option> <!-- limit UI to gens 1–3 -->
        </select>
      </div>
      <input id="search" placeholder="Enter Pokemon name" autocomplete="off">
      <div id="suggestions" class="suggestions"></div>
      <button id="go">Lookup</button>
      <div id="output"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
