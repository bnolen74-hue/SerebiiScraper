<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Serebii Pokedex Web</title>
  <style>
    body { font-family: 'PressStart2P', sans-serif; padding: 1rem; background:#a0a0b0; }
    @font-face {
      font-family: 'PressStart2P';
      src: url('https://fonts.gstatic.com/s/pressstart2p/v11/e3t4eu-3XJCpt3cofoJ36DCb1YrQ.woff2') format('woff2');
    }
    h1 { color:#0f380f; text-align:center; }
    .screen-container { background-color: #a0a0b0; border-radius: 20px; padding: 10px; box-shadow: 0 5px 6px rgba(0,0,0,0.3); max-width:400px; margin:20px auto; }
    .screen { background-color: #0f380f; border-radius: 12px; padding: 16px; border: 2px solid #6b8c6b; color:#fff; }
    #output { white-space: normal; margin-top:12px; }
    input { padding: 10px; margin-bottom:8px; width:100%; border:1px solid #8bac0f; background:#0f380f; color:#fff; border-radius:4px; font-family:'PressStart2P'; font-size:10px; }
    button { background-color: #8bac0f; padding: 10px 16px; border:none; border-radius:4px; font-family:'PressStart2P'; font-size:10px; color:#0f380f; cursor:pointer; }
    button:active { transform: scale(0.9); }
    a { color: #8bac0f; text-decoration:none; }
    ul { padding-left:20px; }
    .tabs { margin-top:12px; }
    .tab-btn { background:#6b8c6b; border:1px solid #8bac0f; color:#0f380f; font-family:'PressStart2P'; font-size:10px; margin-right:4px; padding:4px 8px; cursor:pointer; }
    .tab-btn.active { background:#8bac0f; }
    .tab-content { margin-top:8px; }
    /* evolution table styling */
    .evolution-chains table { border:1px solid #6b8c6b; margin-bottom:6px; }
    .evolution-chains td { border:1px solid #6b8c6b; text-align:center; }
    /* autocomplete suggestions */
    .suggestions { position: relative; }
    .suggestions ul { list-style:none; margin:0; padding:0; background:#0f380f; border:1px solid #6b8c6b; max-height:120px; overflow-y:auto; }
    .suggestions li { padding:4px 8px; font-size:10px; cursor:pointer; }
    .suggestions li.active { background:#8bac0f; color:#0f380f; }
  </style>
</head>
<body>
  <h1>Pokedex Lookup</h1>
  <div class="screen-container">
    <div class="screen">
      <div style="margin-bottom:8px;">
        <label for="gen-select" style="font-size:10px;">Gen:</label>
        <select id="gen-select" style="font-family:'PressStart2P'; font-size:10px;">
          <option value="all">All</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option> <!-- limit UI to gens 1–3 -->
        </select>
      </div>
      <input id="search" placeholder="Enter Pokemon name" autocomplete="off">
      <div id="suggestions" class="suggestions"></div>
      <button id="go">Lookup</button>
      <div id="output"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
